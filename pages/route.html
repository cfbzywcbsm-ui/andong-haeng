<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>노선 상세 - 안동행(行)</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
</head>
<body>

  <!-- 탑바 -->
  <header class="topbar">
    <a href="search.html" class="topbar-back">‹</a>
    <h1 class="topbar-title">100번 버스</h1>
  </header>

  <main class="content">

    <div class="section-title">경유 정류장</div>

    <!-- 정류장 1 (지나침) -->
    <div class="card card-white route-card">
      <div class="route-info">
        <p class="route-station">1. 국립경국대</p>
        <p class="route-status status-passed">12분 전 통과</p>
      </div>
    </div>

    <!-- 정류장 2 (지나침) -->
    <div class="card card-white route-card">
      <div class="route-info">
        <p class="route-station">2. 용상정수장</p>
        <p class="route-status status-passed">8분 전 통과</p>
      </div>
    </div>

    <!-- 정류장 3 (현재 위치) -->
    <div class="card card-white route-card route-card-active">
      <div class="route-info">
        <p class="route-station">3. 안동역 앞</p>
        <p class="route-status status-current">🚌 현재 위치</p>
      </div>
    </div>

    <!-- 정류장 4 -->
    <div class="card card-white route-card">
      <div class="route-info">
        <p class="route-station">4. 옥동 사거리</p>
        <p class="route-status status-arrive">4분 후 도착 예정</p>
      </div>
    </div>

    <!-- 정류장 5 -->
    <div class="card card-white route-card">
      <div class="route-info">
        <p class="route-station">5. 신시장</p>
        <p class="route-status status-arrive">8분 후 도착 예정</p>
      </div>
    </div>

    <!-- 정류장 6 -->
    <div class="card card-white route-card">
      <div class="route-info">
        <p class="route-station">6. 안동터미널</p>
        <p class="route-status status-arrive">13분 후 도착 예정</p>
      </div>
    </div>

  </main>

  <!-- 하단 탭바 -->
  <nav class="tabbar">
    <a href="../index.html" class="tab">
      <span class="tab-icon"><span class="iconify" data-icon="material-symbols:home"></span></span>
      <span class="tab-label">홈</span>
    </a>
    <a href="search.html" class="tab active">
      <span class="tab-icon"><span class="iconify" data-icon="material-symbols:search"></span></span>
      <span class="tab-label">노선</span>
    </a>
    <a href="taxi.html" class="tab">
      <span class="tab-icon"><span class="iconify" data-icon="material-symbols:local-taxi"></span></span>
      <span class="tab-label">택시</span>
    </a>
    <a href="menu.html" class="tab">
      <span class="tab-icon"><span class="iconify" data-icon="material-symbols:menu"></span></span>
      <span class="tab-label">메뉴</span>
    </a>
  </nav>

</body>
