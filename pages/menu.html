<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메뉴 - 안동행(行)</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
</head>
<body>

  <!-- 홈 화면 블러 배경 -->
  <div class="drawer-overlay open" onclick="closeDrawer()"></div>

  <!-- 사이드 드로어 -->
  <div class="drawer open">
    <div class="drawer-header">
      <span class="drawer-title">메뉴</span>
    </div>

    <div class="drawer-content">

      <!-- 알림 설정 -->
      <div class="menu-item">
        <span class="menu-label">알림 설정</span>
        <label class="toggle">
          <input type="checkbox" id="alarm-toggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="menu-divider"></div>

      <!-- 다크모드 -->
      <div class="menu-item">
        <span class="menu-label">다크모드</span>
        <label class="toggle">
          <input type="checkbox" id="dark-toggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="menu-divider"></div>

      <!-- 시외버스/기차 -->
      <a href="transit.html" class="menu-item menu-link">
        <span class="menu-label">시외버스 / 기차</span>
        <span class="menu-arrow">›</span>
      </a>
      <div class="menu-divider"></div>

      <!-- 버전 정보 -->
      <div class="menu-item">
        <span class="menu-label menu-gray">버전 정보</span>
        <span class="menu-version">v1.0.0</span>
      </div>

    </div>
  </div>

  <!-- 알림 토스트 -->
  <div id="toast" style="
    display:none;
    position:fixed;
    bottom:100px;
    left:50%;
    transform:translateX(-50%);
    background:#1E293B;
    color:white;
    padding:12px 24px;
    border-radius:20px;
    font-size:14px;
    z-index:999;
  "></div>

  <!-- 하단 탭바 -->
  <nav class="tabbar">
    <a href="../index.html" class="tab">
      <span class="tab-icon"><span class="iconify" data-icon="material-symbols:home"></span></span>
      <span class="tab-label">홈</span>
    </a>
    <a href="search.html" class="tab">
      <span class="tab-icon"><span class="iconify" data-icon="material-symbols:search"></span></span>
      <span class="tab-label">노선</span>
    </a>
    <a href="taxi.html" class="tab">
      <span class="tab-icon"><span class="iconify" data-icon="material-symbols:local-taxi"></span></span>
      <span class="tab-label">택시</span>
    </a>
    <a href="menu.html" class="tab active">
      <span class="tab-icon"><span class="iconify" data-icon="material-symbols:menu"></span></span>
      <span class="tab-label">메뉴</span>
    </a>
  </nav>

  <script>
    function closeDrawer() {
      window.history.back();
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 2000);
    }

    // 저장된 다크모드 상태 불러오기
    if (localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark-mode');
      document.getElementById('dark-toggle').checked = true;
    }

    document.getElementById('alarm-toggle').addEventListener('change', function() {
      showToast(this.checked ? '🔔 알림이 켜졌습니다' : '🔕 알림이 꺼졌습니다');
    });

    document.getElementById('dark-toggle').addEventListener('change', function() {
      document.body.classList.toggle('dark-mode', this.checked);
      localStorage.setItem('darkMode', this.checked);
      showToast(this.checked ? '🌙 다크모드 켜짐' : '☀️ 다크모드 꺼짐');
    });
  </script>

<script>
  if (localStorage.getItem('darkMode') === 'true') {
    document.body.classList.add('dark-mode');
  }
</script>
</body>
</html>
