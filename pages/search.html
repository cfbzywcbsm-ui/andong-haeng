<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>노선 검색 - 안동행(行)</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- 탑바 -->
  <header class="topbar">
    <h1 class="topbar-title">노선 검색</h1>
  </header>

  <!-- 검색바 -->
  <main class="content">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" placeholder="버스 번호 또는 정류장 이름">
    </div>

    <!-- 검색 결과 -->
    <div class="section-title">검색 결과</div>

    <div class="card card-white">
      <span class="bus-number">100</span>
      <div class="bus-info">
        <p class="bus-route">안동역 → 터미널</p>
        <p class="bus-arrive">버스</p>
      </div>
    </div>

    <div class="card card-white">
      <span class="bus-number">212</span>
      <div class="bus-info">
        <p class="bus-route">안동역 → 안동대학교</p>
        <p class="bus-arrive">버스</p>
      </div>
    </div>

  </main>

  <!-- 하단 탭바 -->
  <nav class="tabbar">
    <a href="../index.html" class="tab">
      <span class="tab-icon">🏠</span>
      <span class="tab-label">홈</span>
    </a>
    <a href="search.html" class="tab active">
      <span class="tab-icon">🔍</span>
      <span class="tab-label">노선</span>
    </a>
    <a href="taxi.html" class="tab">
      <span class="tab-icon">🚕</span>
      <span class="tab-label">택시</span>
    </a>
    <a href="menu.html" class="tab">
      <span class="tab-icon">☰</span>
      <span class="tab-label">메뉴</span>
    </a>
  </nav>

</body>
</html>
