<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>노선 검색 - 안동행(行)</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
</head>
<body>

  <!-- 탑바 -->
  <header class="topbar">
    <h1 class="topbar-title">노선 검색</h1>
  </header>

  <main class="content">
    <!-- 검색바 -->
    <div class="search-box">
      <span class="search-icon"><span class="iconify" data-icon="material-symbols:search"></span></span>
      <input type="text" class="search-input" id="search-input" placeholder="버스 번호 또는 정류장 이름">
    </div>

    <!-- 검색 결과 -->
    <div class="section-title" id="result-title">전체 노선</div>
    <div id="result-list"></div>

  </main>

  <!-- 하단 탭바 -->
  <nav class="tabbar">
    <a href="../index.html" class="tab">
      <span class="tab-icon"><span class="iconify" data-icon="material-symbols:home"></span></span>
      <span class="tab-label">홈</span>
    </a>
    <a href="search.html" class="tab active">
      <span class="tab-icon"><span class="iconify" data-icon="material-symbols:search"></span></span>
      <span class="tab-label">노선</span>
    </a>
    <a href="taxi.html" class="tab">
      <span class="tab-icon"><span class="iconify" data-icon="material-symbols:local-taxi"></span></span>
      <span class="tab-label">택시</span>
    </a>
    <a href="menu.html" class="tab">
      <span class="tab-icon"><span class="iconify" data-icon="material-symbols:menu"></span></span>
      <span class="tab-label">메뉴</span>
    </a>
  </nav>

  <script>
    // 더미 버스 노선 데이터
    const busRoutes = [
      { number: '100', route: '안동역 → 터미널', type: '시내버스' },
      { number: '110', route: '국립경국대 → 안동역(안동터미널)', type: '시내버스' },
      { number: '111', route: '터미널 → 옥동', type: '시내버스' },
      { number: '112', route: '안동역 → 안동역(안동터미널)', type: '시내버스' },
      { number: '200', route: '안동역 → 경북도청', type: '시내버스' },
      { number: '212', route: '안동역 → 안동대학교', type: '시내버스' },
      { number: '240', route: '터미널 → 강남동', type: '시내버스' },
      { number: '250', route: '안동역 → 풍산', type: '시내버스' },
    ];

    function renderList(data) {
      const list = document.getElementById('result-list');
      if (data.length === 0) {
        list.innerHTML = `<p style="text-align:center; color:#AAAAAA; padding:32px;">검색 결과가 없습니다</p>`;
        return;
      }
      list.innerHTML = data.map(bus => `
        <div class="card card-white" style="margin-bottom:8px;">
          <span class="bus-number">${bus.number}</span>
          <div class="bus-info">
            <p class="bus-route">${bus.route}</p>
            <p class="bus-arrive" style="color:#AAAAAA;">${bus.type}</p>
          </div>
          <span style="font-size:20px; color:#AAAAAA;">›</span>
        </div>
      `).join('');
    }

   // 초기에는 빈 화면
renderList([]);
document.getElementById('result-title').style.display = 'none';

    // 검색 기능
    document.getElementById('search-input').addEventListener('input', function() {
      const keyword = this.value.trim();
      const title = document.getElementById('result-title');

    if (keyword === '') {
  title.style.display = 'none';
  renderList([]);
      } else {
        title.textContent = `"${keyword}" 검색 결과`;
        const filtered = busRoutes.filter(bus =>
          bus.number.includes(keyword) || bus.route.includes(keyword)
        );
        renderList(filtered);
      }
    });
  </script>

<script>
  if (localStorage.getItem('darkMode') === 'true') {
    document.body.classList.add('dark-mode');
  }
</script>
</body>
</html>
