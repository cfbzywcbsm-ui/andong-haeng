<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>정류장 상세 - 안동행(行)</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- 탑바 -->
  <header class="topbar">
    <a href="search.html" class="topbar-back">‹</a>
    <h1 class="topbar-title">안동역 앞</h1>
  </header>

  <main class="content">

    <div class="section-title">도착 예정 버스</div>

    <!-- 버스 카드 1 -->
    <div class="card card-white stop-card">
      <span class="bus-number">100</span>
      <div class="bus-info">
        <p class="bus-route">안동역 → 터미널</p>
        <p class="bus-arrive arrive-green" id="arrive-100">3분 후 도착</p>
      </div>
    </div>

    <!-- 버스 카드 2 -->
    <div class="card card-white stop-card">
      <span class="bus-number">212</span>
      <div class="bus-info">
        <p class="bus-route">안동역 → 안동터미널</p>
        <p class="bus-arrive arrive-green" id="arrive-212">11분 후 도착</p>
      </div>
    </div>

    <!-- 버스 카드 3 (운행 정보 없음) -->
    <div class="card card-white stop-card stop-card-gray">
      <span class="bus-number bus-number-gray">500</span>
      <div class="bus-info">
        <p class="bus-route bus-route-gray">안동역 → 풍산</p>
        <p class="bus-arrive arrive-gray">운행 정보 없음</p>
      </div>
    </div>

  </main>

  <!-- 하단 탭바 -->
  <nav class="tabbar">
    <a href="../index.html" class="tab">
      <span class="tab-icon">🏠</span>
      <span class="tab-label">홈</span>
    </a>
    <a href="search.html" class="tab active">
      <span class="tab-icon">🔍</span>
      <span class="tab-label">노선</span>
    </a>
    <a href="taxi.html" class="tab">
      <span class="tab-icon">🚕</span>
      <span class="tab-label">택시</span>
    </a>
    <a href="menu.html" class="tab">
      <span class="tab-icon">☰</span>
      <span class="tab-label">메뉴</span>
    </a>
  </nav>

  <script>
    // 더미 카운트다운
    const buses = [
      { id: 'arrive-100', minutes: 3 },
      { id: 'arrive-212', minutes: 11 },
    ];

    function updateArrivals() {
      buses.forEach(bus => {
        const el = document.getElementById(bus.id);
        if (!el) return;
        if (bus.minutes <= 0) {
          el.textContent = '곧 도착';
        } else {
          el.textContent = `${bus.minutes}분 후 도착`;
          bus.minutes--;
        }
      });
    }

    updateArrivals();
    setInterval(updateArrivals, 60000);
  </script>

</body>
</html>
